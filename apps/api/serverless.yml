service: restaurant-order-api

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    NODE_ENV: ${self:provider.stage}
    MONGODB_URI: ${env:MONGODB_URI, 'mongodb://localhost:27017/restaurant'}
    REDIS_URL: ${env:REDIS_URL, 'redis://localhost:6379'}

plugins:
  - serverless-offline

functions:
  api:
    handler: dist/lambda.handler
    events:
      - http:
          path: /{proxy+}
          method: ANY
      - http:
          path: /
          method: ANY

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true

package:
  individually: true
  patterns:
    - "!node_modules/**"
    - "!.git/**"
